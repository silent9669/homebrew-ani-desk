name: Brew Test Bot

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      full_validation:
        description: "Run online audit and install smoke against published release assets"
        required: false
        default: true
        type: boolean

jobs:
  syntax:
    name: Tap syntax and cask audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link checkout as tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/silent9669/homebrew-ani-desk"
          rm -rf "$TAP_DIR"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Prepare brew test-bot
        run: |
          brew test-bot --only-cleanup-before
          brew test-bot --only-setup

      - name: Run tap syntax check
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: brew test-bot --only-tap-syntax

      - name: Audit cask structure
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: brew audit --cask --strict --arch arm silent9669/ani-desk/ani-desk

  release-smoke:
    name: Published cask install smoke
    if: github.event_name == 'workflow_dispatch' && inputs.full_validation
    runs-on: macos-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4

      - name: Link checkout as tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/silent9669/homebrew-ani-desk"
          rm -rf "$TAP_DIR"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Prepare brew test-bot
        run: |
          brew test-bot --only-cleanup-before
          brew test-bot --only-setup

      - name: Audit published cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: brew audit --cask --strict --online --arch arm silent9669/ani-desk/ani-desk

      - name: Install cask smoke
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: brew install --cask silent9669/ani-desk/ani-desk
